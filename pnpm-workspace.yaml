packages:
  - "apps/*"
  - "packages/*"

# pnpm v11 blocks dependency install/build scripts by default. We explicitly
# decide, per dependency, whether its build script may run:
#   - esbuild (pulled in by Vitest) is trusted and needs its build script.
#   - prisma / @prisma/client / @prisma/engines are trusted (first-party Prisma)
#     and their postinstall downloads the query engine + generates the client.
#   - msgpackr-extract (optional native accel for msgpackr, via BullMQ) is left
#     unbuilt; msgpackr transparently falls back to its pure-JS codec, so we
#     avoid running an untrusted native build with no functional loss.
#   - unrs-resolver (napi-rs native module resolver used by eslint-config-next's
#     import resolver) is trusted; its install script fetches the prebuilt
#     platform binary so ESLint can resolve module paths.
onlyBuiltDependencies:
  - esbuild
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - unrs-resolver
allowBuilds:
  esbuild: true
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  msgpackr-extract: false
  unrs-resolver: true
