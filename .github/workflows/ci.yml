name: CI

on:
  push:
    branches: [main, "phase-*/*"]
  pull_request:

jobs:
  web:
    name: Web — lint, types, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web type-check
      - run: pnpm --dir apps/web vitest run

  api:
    name: API — lint, types (+ DB tests when secret set)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check app/ tests/
      - run: mypy app/ --ignore-missing-imports
      # The pytest suite needs the hosted Postgres test schema. It runs only
      # when the DATABASE_URL_TEST secret is configured, and skips loudly
      # (rather than passing silently) when it isn't.
      - name: pytest (hosted DB)
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
        run: |
          if [ -z "$DATABASE_URL_TEST" ]; then
            echo "::warning::DATABASE_URL_TEST secret not set — DB test suite skipped"
            exit 0
          fi
          pip install -r requirements.txt
          python -m pytest tests/ -q
