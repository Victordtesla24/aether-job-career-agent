# Aether production vhost — https://5cb5f0620.abacusai.cloud
# Tracked in-repo (deploy/) and symlinked to /etc/nginx/conf.d/5cb5f0620.conf
# (W-E quality sweep: previously an untracked plain file in /etc).
server {
    listen 80;
    server_name 5cb5f0620.vm.internal;

    # §7.3 security headers: allow embedding only from Aether itself and the
    # ChatLLM preview; no X-Frame-Options (it would conflict with CSP).
    add_header Content-Security-Policy "frame-ancestors 'self' https://*.abacus.ai" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Next.js web app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_x_original_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.abacus.ai" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # FastAPI backend (proxied through /api/)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_x_original_host;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 180s;
        add_header Access-Control-Allow-Origin "https://5cb5f0620.abacusai.cloud" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.abacus.ai" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
