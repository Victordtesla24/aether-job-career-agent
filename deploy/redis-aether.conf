# Aether Redis drop-in (GAP-P7-ASYNC-001, blueprint §1.3).
# Install as /etc/redis/redis.conf.d/aether.conf (or fold into /etc/redis/redis.conf).
# The VM is SHARED across projects/sessions, so loopback binding alone is NOT
# single-tenant: use requirepass + a dedicated logical DB (3).
#
#   sudo apt-get update && sudo apt-get install -y redis-server
#   sudo install -m 0640 -o redis -g redis deploy/redis-aether.conf /etc/redis/redis.conf.d/aether.conf
#   # replace __AETHER_REDIS_PASSWORD__ with: openssl rand -hex 24  (same value as .env AETHER_REDIS_PASSWORD)
#   sudo systemctl enable --now redis-server
#   redis-cli -a "$AETHER_REDIS_PASSWORD" -n 3 ping   # expect PONG

# localhost only — never exposed via nginx
bind 127.0.0.1 -::1
protected-mode yes
# confirm free at provision time; else 6380 (+ update AETHER_REDIS_URL)
port 6379
requirepass __AETHER_REDIS_PASSWORD__
# queue holds tens of small JSON payloads; Postgres is source of truth
maxmemory 256mb
# never silently drop queue entries
maxmemory-policy noeviction
# RDB snapshots suffice; BackgroundJob (Postgres) is authoritative
appendonly no
