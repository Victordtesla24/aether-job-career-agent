name: CI

on:
  push:
    branches: [main, "phase-*/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Web app — Next.js / TypeScript (Node 20)
  # ---------------------------------------------------------------------------
  web:
    name: web (Node 20)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @aether/web lint

      - name: Type-check
        run: pnpm --filter @aether/web type-check

      - name: Unit tests
        run: pnpm --filter @aether/web test

      - name: Build
        run: pnpm --filter @aether/web build

  # ---------------------------------------------------------------------------
  # API app — FastAPI / Python (3.11)
  # ---------------------------------------------------------------------------
  api:
    name: api (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Type-check (mypy)
        run: python -m mypy app

      - name: Unit tests (pytest)
        run: python -m pytest -q
